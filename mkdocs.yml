site_name: MRSimTracks
site_description: Generate CFD-derived particle trajectories for MR flow simulation.
site_url: https://mcgrathcm.github.io/MRSimTracks/
repo_url: https://github.com/mcgrathcm/MRSimTracks
repo_name: mcgrathcm/MRSimTracks

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.code.annotate

nav:
  - Overview: index.md
  - Install: install.md
  - Quick Start: quickstart.md
  - Data Model: data-model.md
  - Data Provenance: data-provenance.md
  - Reseeding: reseeding.md
  - Testing: testing.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true
