name: Release Validation

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*"

jobs:
  full-data-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run full-data validation
        env:
          MRSIMTRACKS_METRICS_DIR: release-metrics
        run: uv run pytest -m large

      - name: Upload validation metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-validation-metrics
          path: release-metrics/*.json
          if-no-files-found: warn
